name: I-llumin-A Auto Publisher

on:
  schedule:
    - cron: '0 8 * * *'      # 09:00 CET ogni giorno (mattina)
    - cron: '30 17 * * *'    # 18:30 CET ogni giorno (sera)
  workflow_dispatch:          # trigger manuale (iPhone Shortcut / Telegram bot)
    inputs:
      reason:
        description: 'Motivo del run manuale'
        required: false
        default: 'manual'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -1

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore used_topics cache (evita ripetizioni intraday)
        uses: actions/cache@v4
        with:
          path: used_topics_today.txt
          key: used-topics-${{ github.run_id }}
          restore-keys: used-topics-

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
